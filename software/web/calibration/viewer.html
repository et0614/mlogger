<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Logger | Anemometer Calibration Report</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
               max-width: 900px; margin: 0 auto; padding: 20px; color: #111; }
        header { border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 24px; }
        .header-inner { display: flex; justify-content: space-between; align-items: baseline; }
        h1 { margin: 0; font-size: 1.6rem; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 6px; margin-top: 30px; }
        h3 { margin-top: 24px; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        th, td { border: 1px solid #ccc; padding: 6px 10px; }
        th { background: #f4f4f4; }
        .monospace { font-family: "SFMono-Regular", Consolas, monospace; }
        nav.lang-nav a { margin-left: 12px; color: #333; text-decoration: none; }
        nav.lang-nav a:hover { text-decoration: underline; }
        footer { margin-top: 60px; padding-top: 12px; border-top: 1px solid #ccc;
                 font-size: 0.85rem; color: #666; text-align: center; }
        .meta {
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.95rem;
            margin: 10px 0 30px 0;
        }
        .meta span {
            display: inline-block;
            margin-right: 30px;
        }
        .meta b {
            color: #555;
            font-weight: normal;
            margin-right: 6px;
        }
        .plot-img {
            max-width: 100%;
            display: block;
            margin: 20px 0;
            border: 1px solid #000;
        }
        .status {
            padding: 40px 20px;
            border: 1px dashed #000;
            text-align: center;
            margin: 40px 0;
        }
        .error h2 {
            border: none;
            padding: 0;
            margin: 0 0 10px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
        }
        td.num, th.num {
            text-align: right;
            font-family: "SFMono-Regular", Consolas, monospace;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>M-Logger</h1>
            <nav class="lang-nav">
                <a href="./">SEARCH</a>
            </nav>
        </div>
    </header>

    <main id="main">
        <div class="status" id="loading">Loading...</div>
    </main>

    <footer>
        &copy; Togashi Research Institute LLC
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = (params.get('id') || '').toUpperCase();
        const main = document.getElementById('main');

        function showError(title, body) {
            main.innerHTML = `
                <section class="status error">
                    <h2>${title}</h2>
                    <p>${body}</p>
                    <a class="back-link" href="./">&larr; Back to search</a>
                </section>`;
        }

        function fmt(n, digits) {
            if (n === null || n === undefined) return '&infin;';
            return Number(n).toFixed(digits);
        }

        function render(doc) {
            const id = doc.device_id;
            const cal = (doc.calibrations || {});
            const a = cal.anemometer;

            let html = `
                <section>
                    <h2>Anemometer ${id}</h2>
                    <div class="meta">
                        <span><b>Schema:</b> v${doc.schema_version}</span>
                    </div>
                </section>`;

            if (a) {
                const rangeRows = a.ranges.map((r, i) => `
                    <tr>
                        <td>Range ${i + 1}</td>
                        <td class="num">${fmt(r.v_min, 2)}</td>
                        <td class="num">${r.v_max === null ? '&infin;' : fmt(r.v_max, 2)}</td>
                        <td class="num">${fmt(r.m, 4)}</td>
                        <td class="num">${fmt(r.lnC, 4)}</td>
                    </tr>`).join('');

                const verRows = a.verification.map(r => `
                    <tr>
                        <td class="num">${fmt(r.ref_velocity, 2)}</td>
                        <td class="num">${fmt(r.measured_velocity, 3)}</td>
                        <td class="num">${fmt(r.error_pct, 1)}</td>
                        <td class="num">${fmt(r.voltage_mV, 1)}</td>
                    </tr>`).join('');

                html += `
                    <section>
                        <h2>Calibration</h2>
                        <div class="meta">
                            <span><b>Calibrated:</b> ${a.calibrated_at}</span>
                            <span><b>Model:</b> ${a.model}</span>
                            <span><b>E0:</b> ${fmt(a.E0, 6)} V</span>
                        </div>

                        <h3>Coefficients (3-Range King's Law Fit)</h3>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th></th>
                                        <th class="num">v_min [m/s]</th>
                                        <th class="num">v_max [m/s]</th>
                                        <th class="num">m</th>
                                        <th class="num">lnC</th>
                                    </tr>
                                </thead>
                                <tbody>${rangeRows}</tbody>
                            </table>
                        </div>

                        <h3>Verification</h3>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="num">Ref [m/s]</th>
                                        <th class="num">Measured [m/s]</th>
                                        <th class="num">Error [%]</th>
                                        <th class="num">Voltage [mV]</th>
                                    </tr>
                                </thead>
                                <tbody>${verRows}</tbody>
                            </table>
                        </div>

                        <h3>Plot</h3>
                        ${a.plot && a.plot.data_url
                            ? `<img class="plot-img" src="${a.plot.data_url}" alt="Calibration plot">`
                            : '<p>No plot available.</p>'}
                    </section>`;
            } else {
                html += `<section><p>No anemometer calibration data available for this device.</p></section>`;
            }

            document.title = `M-Logger | ${id} Calibration`;
            main.innerHTML = html;
        }

        if (!/^[0-9A-F]{6}$/.test(id)) {
            showError('Invalid ID', 'Device ID must be 6 hexadecimal characters (0-9, A-F).');
        } else {
            fetch(`./reports/${id}.json`, {cache: 'no-cache'})
                .then(res => {
                    if (!res.ok) throw new Error(res.status);
                    return res.json();
                })
                .then(render)
                .catch(err => {
                    showError('Not Found', `No calibration report was found for device <span class="monospace">${id}</span>. Please check the ID and try again.`);
                });
        }
    </script>
</body>
</html>
